front:
  text: 長生指要篇序僕蚤歲嬰戚筆視廢頓且於世味澹然忽讀清靜經而發深省由是剛腸辭家蓬頭赤脚遊歷參訪幾半天下至如想腎存心嚥津納氣之術靡不嘗試惟欿然于懷者金丹一事未究根宗天開其運西蜀陸公眞人一見于長汀煙霞道院欣相付授藥物火候運用抽添如指諸掌服膺師訓于兹有年矣因見世人旁門曲徑去道愈遠不忍盡祕遂以微言弘道著爲七篇之書目之曰長生指要庶幾有心之子由是悟入焉耳時淳祐庚戌中秋日三山回陽子林自然序長生指要篇
