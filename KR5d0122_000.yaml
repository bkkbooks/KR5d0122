body:
  text: 回陽子林自然述第一竊聞先天大道在混沌之中不可以識識不可以知知以耳聽之而眼聞以眼視之而耳見恍恍惚惚杳杳冥冥似物非物似象非象強名曰道夫道之妙既不可得而測則在於仰觀俯察而已以人身參之若合符節豫既得玄中之玄妙中之妙不敢盡祕特於有無中發出根蒂牝者即混沌未分之氣也猶瓜之有蒂中藏真精神氣貫通混合造化豈非太乙含真之妙乎兩儀既判始生四象四象生矣而五行備焉然後分布八卦惟中宫之位實為八卦之母也中宫乃土之位也故水得土則止火得土則息金得土則生木得土則旺有如子在母胞之中日得天地沖和之氣正稟中宫同母呼吸以至胞圓既生之後翦去臍蒂所受天地之正氣薰蒸與虛皇之神氣貫通本與天地齊久與虛皇共化一為情欲感於內外好樂發於後先自此氣隔真元神隨物誘雖與天地之真氣交接奈何神化無基反為天地所奪至使形衰氣謝是以不免於死亡之患也信此氣者乃元始浩劫之祖氣神仙性命之宗源得之則生失之則死矣得之者奪天地之造化不得者反為天地之所奪其所奪者一點元陽之真氣也修鍊之士何不歸明於本依時鍛鍊以為大丹且鍛鍊之法不過母呼則呼母吸則吸一呼則天氣下降一吸則地氣上升呼吸有時不比盲鍊動一神則萬神俱動開一竅則九竅皆開學道之士當尋其源如在母胞之中抱其元守其一太一含真氣天地長黃芽蓋黃芽生乃鉛之母也不能行者以致氣絶命亡皆不能回光返照止察於外而不能自察也回陽子曰天地之精英皆聚於日月人之精英悉聚於眼目夫人成形之時先生兩腎內應精輪次生兩目有如水泡與天地實同蓋天地未分之時日月未照之際混混沌沌幽幽冥冥二儀方分兩曜著明水火始出萬物乃生故有變化之妙人欲修鍊須當採元始氣於橫目之下以索天地之藴而致其用可也若能致此妙用謂之高奔日月徹照崑崙前輩度人皆不過指此為軌範也黃庭者安爐立鼎之地也聖功從此而生焉神明從此而出焉上清下濁路通八水上至泥丸中理五氣混合百神下至湧泉周而復始晝夜不息所得天地之正氣與神氣精三者可交結於此功滿十月即得胎圓出世小而至於延年快樂大而至於超凡入聖遨遊變化逍遙於天地之間功滿德就即還於玉虛之上如斯之化且玄且妙修丹之士可不棲心於道乎第二回陽子曰道之與性則一貫之理也天得之積氣以覆於下地得之託質以載於上覆載之間其相去有八萬四千里氣質本不能相交也天以乾索於坤即還於地中其陽負隂而上升地以坤索於乾即還於天中其隂抱陽而下降一升一降運行無窮不失於道所以長久豈有他哉且天地之性於人為貴者也以心比於天而有朱雀之號應於目者其脈赤腎比於地而有玄武之號感於目者其精黑肝為陽位而有青龍之喻發於目者其精青肺為隂位而有白虎之喻見於目者其精白天地造化悉聚於目人能混之以明造化之源以探坎離之候符契動靜之機於日夜之間凝神忘機葆光襲明安得不與天地合其德乎由夫人也自離形於父母之後一染六塵天五沖氣剝落淨盡眼耳鼻舌聲色交混思出其位外通則內暗窒於黃中則體皆裂其大全而麗於一曲背本逐末不復知返而道心屏蔽隱沒不可見矣安能與天地合其德哉非徒不合而又隨之以變至於元陽之損耗真氣之走失皆由物蔽於目精浮於性日常用其光以外照也嗚呼學道之士胡不發易之藴而返思之乎且坤之正位入乾之正加二畫之中則為坎坎水內明于中故也內明水性則通徹無礙外明火性則蔽隔多暗蓋上下皆陽畫則赤而已惟黃居中焉則光故離火本末皆赤至末赤則為過矣隨而黑焉在人者奚可恃哉歸其外明者即蟾光照西川之理也不歸其明者即金木間隔之義也惟達者至逐境處隨覺隨復即襲其明還其性以全坤德自全其德則性不亂性不亂則神不移神不移則精不蕩精不蕩則氣聚氣聚則精火相隨精火相隨則萬神朝元三花聚頂保合太和立見超脫可以成九鼎之丹光直沖虛境與玉清齊其化而後居其太初洪濛之先如不然眉睫之際分彼我矣第三回陽子曰天地本行足數十二時辰只有九十六刻大包天地細入秋毫凡夫不知妄將四刻入於子午卯酉中此皆非也天地造化不可增不可減增則是長減則是短天有十干干乃陽數本也地有十二支支乃耦數末也凡夫行支聖人行干餘刻在其中矣老子曰降本流末而生萬物本則深根固蒂末則開花結子瓜熟蒂脫自然香必剖瓜之人方知瓜滋味也要知學道之士神氣周備不必俱泥於年月日時所謂形神俱妙與道合真更向性究竟向上一著始得性命打成一片去來無礙須要真定後一點靈光透玉池所謂玄牝天地未判如同雞子故無極包於太極混沌未判天地初分先天為體後天為用輕清為天重濁為地中為人身是為三才固生萬物矣內玄牝天地之根外玄牝出入之門鑿開洪濛竅衝透上頂關無限神仙從此出萬年千載列仙班謝師指出本根源跳出輪回生死外在山居市任逍遙隱顯去來無罣礙回陽子曰有中生無無中生有出無入有出有入無故消災經云有有無有終始暗昧不能自明若明心見性者無無有無則異於是所以紫陽真人云定浮沉分賔主本是性為主先是命立成詩云饒他為主我為賔正所謂性命浮沉也譬如太陽出於東海瑞氣滿天霞光燦爛離海門丈餘神光漸散逮乎日將西墜神光再收返本還元亦復如是學道之士當知此理散神光逐萬物凡夫所為聖人隨覺隨復亦如太陽返本歸元崔公入藥鏡即此為鏡也故曰天地造化悉聚於日月人之造化悉聚於本元豈非變化無窮與天地同其長久乎回陽子曰聖胎十月嬰兒顯相學道之士如人起屋先須築基成實方可勝載候天地一陽之生年上取月月上取日日上取時時上取刻十月胎圓功滿德就譬如凡夫千日之後方離乳母身得自在父母交會隂陽一同我自己身由父母隂陽交會非外求也來時雲滿千山去後月舍萬水學道之士我身自有聖父聖母自己身父母我自悟七分師度三分我自悟三分師度七分總為十分也須是自覺自悟方可入道隨力方便接人接果木法全在土栽培豫見世人轉轉迷惑不悟聖人經典一失人身萬劫難復豈不痛哉苦海無邊岸回頭即是山不是我今苦口多言惟恐汝蹉過光隂便好直下承當頓悟超凡入聖紫陽真人曰國富民安當求戰戰罷方能見太平國富則民安民安則國富譬如人之元神元氣元精神歸神室精歸精府氣歸本元三者能歸於本則是民安國富也更能通此妙用便是三家相見結嬰兒之理二物會時情性合虎龍蟠處合中央土之謂也戊為陽土陽土能生萬物己為隂土隂土能長萬物萬物生長人亦如是聖人所以長飲刀圭冬雪漸凝聚即此便是嬰兒姹女笑呵呵黃婆勸丁公指引過曹溪運上昆崘頂浪澎澎降黃庭水火兩相迎回陽子曰人生在世精神有限身在則有餘富貴榮華如空華過眼何必苦勞心奉勸修道之人及早省悟自古神仙皆從此入詩云葉緑花紅九萬條曾於節候見根苗莫道此果難成熟實灌靈源水一瓢又詩云踏遍這天涯黃母在誰家豁然師指出跣足到煙霞第四回陽子曰天有四時日有十二時凡一時之內各有妙用修鍊之士須當知神藏殺沒過去未來方可採取其奧妙在於攢年簇月月簇日日簇時時簇刻惟恐毫釐之差失也其法又不止爾當上按星辰之躔度下符海潮之往來採天地未判之氣奪日月交會之精故聖人曰天地交時內亦交但從甲乙户中敲蓋一刻工夫自有一日之氣候一日工夫自有一年之氣候一年工夫得之者可奪天地三萬六千年之數昧者烏可以管窺蠡測哉故詩云復卦初爻動天心無轉移箇中得意處便好作丹基第五回陽子曰上古聖人傳授金丹大藥獨於火候不傳者不泄天機故也豫今略露祕旨以此篇為印證夫火之功驗不過散之則成氣聚之則成火化之則成水變之則成金凝此一氣真元不散則火候在其中矣故曰火雖有候不須時些子機關我自知一氣初回才遇朔抽添進退莫教遲者是也或問藥物如何採火候如何煎答曰藥物生玄竅火候發陽爐抽添進退皆由我一氣初回造化樞第六回陽子曰夫神爐丹穴神室玉爐金房此皆丹鼎之異名也黃庭黃道黃房黃婆戊己明堂此皆中宫之異名也真陽為乾為天為父為夫陽魂青龍郎君木汞陽中隂砂中汞朱砂父精木液此皆嬰兒之異名也真隂為坤為地為母為婦隂魄白虎女子金鉛隂中陽鉛中銀水銀母血金精此皆姹女之異名也其名雖多其理則一其為鉛也遠不可取近不可捨得陽汞相濟遇真土方成即金丹大藥也紫陽真人云先把乾坤為鼎器後摶烏兔藥來烹既驅二物歸黃道爭得靈丹不解生者乃道中之一也凡夫無和散一為萬惟聖人能會萬歸一故曰吾道一以貫之夫降而為一一乃生水吾身中之北斗也斗自一生一為命本我之稟受是為本命一三之義天下之至精故能神神則至矣而神之為德未嘗離一莊子曰不離於精謂之神人一者天地萬物之根有根則能生有生則可榮苟不深其根固其蒂將何以為抱一乎豫起處念一卧寐念一飲食念一無不念一無使間斷誠以太玄之一是北方玄天坎宫正一之氣大道之祖也一者元一大一玄一奠一此一氣統天地之元冠隂陽之首為兩曜之根本是萬物之祖宗其積混沌隂陽精氣從坎宫轉歸兌鄉號曰隂中之陽若水中無陽安能載物修真之士儻知此玄天一氣而下手興工指日證真成道矣今且即以北斗七星而備之星者日之所生也北斗從坎生稟日之精也太陽之精自從一生坎之為卦日月葆焉雖曰離為日坎為月此卦之分離函五數坎函五數兼坎離而成十也天一地六而坎又居之是兼日月之用也人謂北斗以其在北非也生於坎故曰北斗運於中故曰中斗歌曰九元位坎居中極衆曜持守掌化成真人自在歸魁上垂象杓從月建行夫坎實為命本離虛為性本如太上説南北二斗真經亦先北而後南北為天一南為地二坎為玄離為赤赤火也玄水也水中生火精中生氣説北不可以無南南北會合坎離交並存精以入神互用之妙也若非精神豈曰本命命中之命在父母未生胞胎之前無本之命也命中之命命在玄元玄元者道之一氣也玄中有玄是我命命中有命是我形精氣神全則身不衰老形命永存合乎自然與天地相為長久人之生也命以為本命不稟於天道不能生也其曰自然固有自然而然猶上命而下受也蓋九天之氣下降方結胞胎九天司馬不下命章人終不能生受形保神貴氣固根終不死壞而得神仙貴乎哉經云我不視不聽不知神不出神與道同久然後言我命在我不囿於造化七元經云大帝告七真曰下元生人從氤氲真一之氣元精所生稟為一形皆備三元養育九氣覆護故北斗七元人人具足初九潛龍建子之位也北斗元君在焉知此元神運育涵養形神合同則真靈外應玄功自成歌曰無星不拱天垣北惟有真機在杳冥故辰極者為天心以正為方對崑崙之頂在紫宫北極崆洞正天之中四輔之內華蓋之下為天之心靜而不動為元氣之主符天地之樞紀也歌曰真陽館裏氣徘徊升降三宫密往來生死不關浮世事相將五老上金臺五老者五藏之神也人人自有一十二節三十六小骨孔孔相對脈脈相通節節相連修鍊功至則金筋玉骨百骸不壞清氣上升而為天清之又清神之又神陽之又陽人稟天元一氣而生自三清分三氣於三元上丹田泥丸府上應玉清青氣中丹田絳宫府上應上清白氣下丹田交會府上應太清黃氣前所謂存精以入神是也太清真土非厚地重濁之土化生萬物者天也統三宫以為一亘萬世而無弊三宫升降上下往來無窮不息斯之謂歟要知自己三清何勞上望自己老君何假外覓太上曰精是吾神氣是吾道藏精養氣保守堅正隂陽交合以立真形而化生童子嘗審鼻息不至耳聞口言不至肺震則丹脈自成氣化為精精化為神神化乃心之童子也我身中有三萬六千神君常侍左右久久如此則自己三清自己老君見矣大哉北斗七星之妙用乎七星真形名號乃元始七真之七氣亦人身中七竅之真氣隂陽斗星巡歷十二支之上子午卯酉之宫有超凡入聖之道在其中矣故第四文曲乃隂陽交會之門正卯酉生人所屬卯酉會合于此況隂中有陽陽中有隂是曰二八之門丹經云龍遊十六之門虎隱九三之户在乎天關其道乃玄極人能明隂陽互用烏兔交加道氣由是增神丹乃克就黃庭經云三關之中精氣神九微之內幽且幽口為天關精神機手為人關把盛衰足為地關生命扉而斗中具有三關天關在午人關在卯酉地關在子午隂陽隔界之位卯酉日月出入之門磋夫玄者萬物之祖理具有也物之隱玄未若人身之隱玄人身之隱玄即天機也玄功也故隂符經云聖功生焉神明出焉是知玄者氣之祖道之真天之色法之妙理之奧水之本能窮其理須造其玄充盡其性乃至於命試思混沌未分之初年月日時安在哉神是性兮氣是命神不外馳氣自定能事畢矣第七回陽子曰金丹大藥固在乎師之所傳亦在乎天之所祐我道祖太上老君道德經曰天道無親常與善人祖師魏伯陽參同契曰天道無適莫兮惟傳與賢者祖師純陽真人沁園春曰蓬莢路仗三千行滿獨步雲歸祖師張真人詩曰大藥修之有易難也知由我也由天若非積行施隂德動有群魔作障緣又西江月云德行修逾八百隂功積滿三千均齊物我與親冤始合神仙本願蓋金丹之成本是天所以賞大善之人若不務修隂德而但欲竊取大道者則天不祐之縱饒下手決定魔生障隔或積年纍載忙不見功乃反怨道咎師而致敗壞也若有好道之士常能存心仁慈濟物救貧拔苦好生度命勸人為忠為孝為仁為義為一切善事為種種隂德者有如買放生命方便戒殺等事則仙真保舉上帝降祥尋訪便遇明師傳授便得正法下手速修天既祐之諸神擁護決定永無魔障動靜皆合真機尅日功圓以至住世長生超脫升登雲輦形神俱妙逍遙自在又且福及後人永承道蔭此雖是師恩實天賜也二十餘年訪道經遊萬水千山明師未遇肯安間幾度拈香一瓣幸遇至人説破虛無妙用循環工夫只在片時間遍體神光燦爛右西江月近向死裏又還生回來認著主人翁這番行船牢把柁任你八風吹不動深夜一輪月中宫太極圖萬里碧霄明皎潔青山直是片雲無快活真快活常人説甚難世人問我行何事默默無言是大還金丹合潮候圖鑿開混沌見錢塘南空長江銀璧今古詞人圖此景誰解推原端的歲去年來日庚月甲因甚無差忒如今説破要知天地來歷道散有一強名五行顛倒互列乾坤曆坎水逆流朝丙户隨月盈虧消息氣到中秋金能生水倍湧千重雪神仙妙用與潮沒箇差别賦此酹江月詞默合周天之數故録潮候于右以示同志潮候之圖初一日十六日午末大夜子正初二日十七日未初大夜子末初三日十八日未正大夜丑初初四日十九日未末大夜丑末初五日二十日申正下岸夜寅初初六日二十一日寅末漸小晚申末初七日二十二日卯初漸小晚酉初初八日二十三日卯末小晚酉正初九日二十四日辰初小晚酉末初十日二十五日辰末交澤夜戌正十一日二十六日巳初起水夜戌末十二日二十七日巳正漸大夜亥初十三日二十八日巳末漸大夜亥正十四日二十九日午初漸大夜亥末十五日三十日午正極大夜子初長生指要篇
